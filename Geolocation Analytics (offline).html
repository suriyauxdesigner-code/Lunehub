document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

emoving background-images of controls. */\r\n\t.leaflet-control {\r\n\t\t-webkit-print-color-adjust: exact;\r\n\t\tprint-color-adjust: exact;\r\n\t\t}\r\n\t}\r\n<\u002Fstyle>\n<style>.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {\n\t-webkit-transition: -webkit-transform 0.3s ease-out, opacity 0.3s ease-in;\n\t-moz-transition: -moz-transform 0.3s ease-out, opacity 0.3s ease-in;\n\t-o-transition: -o-transform 0.3s ease-out, opacity 0.3s ease-in;\n\ttransition: transform 0.3s ease-out, opacity 0.3s ease-in;\n}\n\n.leaflet-cluster-spider-leg {\n\t/* stroke-dashoffset (duration and function) should match with leaflet-marker-icon transform in order to track it exactly */\n\t-webkit-transition: -webkit-stroke-dashoffset 0.3s ease-out, -webkit-stroke-opacity 0.3s ease-in;\n\t-moz-transition: -moz-stroke-dashoffset 0.3s ease-out, -moz-stroke-opacity 0.3s ease-in;\n\t-o-transition: -o-stroke-dashoffset 0.3s ease-out, -o-stroke-opacity 0.3s ease-in;\n\ttransition: stroke-dashoffset 0.3s ease-out, stroke-opacity 0.3s ease-in;\n}\n<\u002Fstyle>\n<style>.marker-cluster-small {\n\tbackground-color: rgba(181, 226, 140, 0.6);\n\t}\n.marker-cluster-small div {\n\tbackground-color: rgba(110, 204, 57, 0.6);\n\t}\n\n.marker-cluster-medium {\n\tbackground-color: rgba(241, 211, 87, 0.6);\n\t}\n.marker-cluster-medium div {\n\tbackground-color: rgba(240, 194, 12, 0.6);\n\t}\n\n.marker-cluster-large {\n\tbackground-color: rgba(253, 156, 115, 0.6);\n\t}\n.marker-cluster-large div {\n\tbackground-color: rgba(241, 128, 23, 0.6);\n\t}\n\n\t/* IE 6-8 fallback colors */\n.leaflet-oldie .marker-cluster-small {\n\tbackground-color: rgb(181, 226, 140);\n\t}\n.leaflet-oldie .marker-cluster-small div {\n\tbackground-color: rgb(110, 204, 57);\n\t}\n\n.leaflet-oldie .marker-cluster-medium {\n\tbackground-color: rgb(241, 211, 87);\n\t}\n.leaflet-oldie .marker-cluster-medium div {\n\tbackground-color: rgb(240, 194, 12);\n\t}\n\n.leaflet-oldie .marker-cluster-large {\n\tbackground-color: rgb(253, 156, 115);\n\t}\n.leaflet-oldie .marker-cluster-large div {\n\tbackground-color: rgb(241, 128, 23);\n}\n\n.marker-cluster {\n\tbackground-clip: padding-box;\n\tborder-radius: 20px;\n\t}\n.marker-cluster div {\n\twidth: 30px;\n\theight: 30px;\n\tmargin-left: 5px;\n\tmargin-top: 5px;\n\n\ttext-align: center;\n\tborder-radius: 15px;\n\tfont: 12px \"Helvetica Neue\", Arial, Helvetica, sans-serif;\n\t}\n.marker-cluster span {\n\tline-height: 30px;\n\t}<\u002Fstyle>\n<style>/* ============ Lune design tokens (extracted from dashboard) ============ */\n:root{\n  --ink:#171A1F;\n  --ink-2:#2B2F36;\n  --muted:#697079;\n  --faint:#9aa1ab;\n  --line:#E9EBEE;\n  --line-2:#EFF1F3;\n  --surface:#FFFFFF;\n  --inset:#F6F7F8;\n  --inset-2:#F1F3F5;\n\n  /* Lune green (brand accent) */\n  --green:#13A07B;\n  --green-ink:#0B6B52;\n  --green-600:#0E8E6D;\n  --green-50:#ECF7F2;\n  --green-100:#D7EFE6;\n\n  --logo:#0C2B26;\n\n  --shadow-sm:0 1px 2px rgba(16,24,40,.05);\n  --shadow-card:0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);\n  --shadow-pop:0 12px 32px -8px rgba(16,24,40,.18), 0 4px 12px -4px rgba(16,24,40,.10);\n  --shadow-panel:-18px 0 48px -24px rgba(16,24,40,.28);\n\n  --r-xs:6px; --r-sm:8px; --r-md:10px; --r-lg:14px; --r-xl:18px;\n\n  --font:'Figtree', system-ui, -apple-system, 'Segoe UI', sans-serif;\n}\n\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;}\nbody{\n  font-family:var(--font);\n  color:var(--ink);\n  background:#FBFBFC;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n}\n::selection{background:var(--green-100);}\n\n/* ============ App shell ============ */\n.app{display:flex;min-height:100vh;}\n\n/* ---- Sidebar ---- */\n.sidebar{\n  width:264px;flex:none;background:#fff;border-right:1px solid var(--line);\n  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;\n}\n.brand{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;}\n.brand-mark{width:26px;height:26px;border-radius:50%;background:var(--logo);position:relative;flex:none;}\n.brand-mark::after{content:\"\";position:absolute;right:4px;top:5px;width:8px;height:8px;border-radius:50%;background:#fff;}\n.brand-name{font-size:21px;font-weight:600;letter-spacing:-.01em;color:var(--ink);}\n.brand .collapse{margin-left:auto;color:var(--faint);display:flex;}\n.nav{padding:6px 14px;display:flex;flex-direction:column;gap:2px;}\n.nav-group-label{display:none;}\n.nav-item{\n  display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;\n  color:var(--ink-2);font-size:14.5px;font-weight:500;cursor:pointer;text-decoration:none;\n  position:relative;\n}\n.nav-item svg{color:var(--muted);flex:none;}\n.nav-item:hover{background:var(--inset);}\n.nav-item.active{background:var(--green-50);color:var(--green-ink);font-weight:600;}\n.nav-item.active svg{color:var(--green-600);}\n.nav-sub{padding-left:34px;font-size:14px;color:var(--muted);font-weight:500;}\n.nav-sub.active{color:var(--green-ink);font-weight:600;background:var(--green-50);}\n.nav-section{margin-top:8px;}\n.ext{margin-left:auto;color:var(--faint);}\n.side-foot{margin-top:auto;padding:14px;border-top:1px solid var(--line);}\n.user{display:flex;align-items:center;gap:11px;padding:8px;border-radius:10px;}\n.avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex:none;}\n.user .nm{font-size:14px;font-weight:600;color:var(--ink);}\n.user .pl{font-size:12.5px;color:var(--muted);}\n\n/* ---- Main ---- */\n.main{flex:1;min-width:0;display:flex;flex-direction:column;}\n.topbar{display:flex;align-items:flex-start;gap:16px;padding:28px 34px 18px;}\n.topbar h1{font-size:27px;font-weight:600;letter-spacing:-.02em;margin:0;}\n.topbar .sub{font-size:14.5px;color:var(--muted);margin-top:3px;}\n.topbar .controls{margin-left:auto;display:flex;gap:10px;}\n.pill-select{\n  display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;background:#fff;\n  border:1px solid var(--line);border-radius:9px;font-size:13.5px;font-weight:500;color:var(--ink-2);cursor:pointer;\n}\n.pill-select svg{color:var(--faint);}\n.flag{width:18px;height:13px;border-radius:2px;object-fit:cover;display:inline-block;background:linear-gradient(#0a8f4a,#0a8f4a);}\n\n.content{padding:0 34px 60px;display:flex;flex-direction:column;gap:22px;}\n\n/* a faint \"above\" strip to convey this sits below the charts */\n.context-strip{\n  display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px dashed var(--line);\n  border-radius:var(--r-lg);background:repeating-linear-gradient(135deg,#fff,#fff 10px,#FBFBFC 10px,#FBFBFC 20px);\n  color:var(--muted);font-size:13px;\n}\n.context-strip .dots{display:flex;gap:5px;}\n.context-strip .dots i{width:7px;height:7px;border-radius:50%;background:var(--line);display:block;}\n.context-strip b{color:var(--ink-2);font-weight:600;}\n\n/* ============ Section card ============ */\n.geo{\n  background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden;\n  box-shadow:var(--shadow-card);\n}\n.geo-head{display:flex;align-items:flex-start;gap:16px;padding:22px 22px 18px;flex-wrap:wrap;}\n.geo-head .titles h2{font-size:19px;font-weight:600;letter-spacing:-.01em;margin:0;display:flex;align-items:center;gap:10px;}\n.tag-new{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--green-ink);background:var(--green-100);padding:3px 7px;border-radius:5px;text-transform:uppercase;}\n.geo-head .titles p{font-size:13.5px;color:var(--muted);margin:4px 0 0;max-width:560px;}\n.geo-head .right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}\n\n.why{\n  display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 12px;border:1px solid var(--line);\n  border-radius:8px;background:#fff;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;position:relative;\n}\n.why svg{color:var(--green-600)          <div class=\"why-pop\" id=\"why-pop\">\n                <h4>What this unlocks for the bank<\u002Fh4>\n                <p>Cardholder transactions carry merchant location. Aggregated, that becomes a live map of where, who and how much — insight banks can monetise or act on.<\u002Fp>\n                <ul>\n                  <li><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span><b>Merchant acquiring leads<\u002Fb> — spot high-volume shops not yet on the bank's terminals.<\u002Fspan><\u002Fli>\n                  <li><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span><b>Co-brand &amp; cashback targeting<\u002Fb> — rank brands by spend in any catchment.<\u002Fspan><\u002Fli>\n                  <li><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span><b>Branch &amp; ATM placement<\u002Fb> — overlay customer spend density.<\u002Fspan><\u002Fli>\n                  <li><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span><b>Demographic slicing<\u002Fb> — gender, age, segment &amp; channel per location.<\u002Fspan><\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- filter bar -->\n        <div class=\"filters\" id=\"filters\"><\u002Fdiv>\n\n        <!-- map + leaderboard -->\n        <div class=\"geo-body\">\n          <div class=\"map-wrap\">\n            <div id=\"map\"><\u002Fdiv>\n            <div class=\"vp-badge\">\n              <div class=\"k\">In current view<\u002Fdiv>\n              <div class=\"v\"><span
